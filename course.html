<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUC7 | Networking Mastery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        .course-nav {
            width: 300px;
            height: calc(100vh - 80px);
            position: sticky;
            top: 80px;
            padding: 2rem;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(5, 5, 5, 0.3);
            backdrop-filter: blur(20px);
        }

        .ch-item {
            padding: 1rem;
            cursor: pointer;
            border-radius: 12px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            transition: var(--transition);
        }

        .ch-item:hover,
        .ch-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .content-area {
            flex: 1;
            padding: 5rem;
            max-width: 900px;
        }
    </style>
</head>

<body style="padding-top: 80px;">
    <nav class="navbar">
        <div class="container nav-container">
            <span class="nav-logo">NUC7</span>
            <div class="nav-links"><a href="index.html">Log Out</a></div>
        </div>
    </nav>

    <div id="lock-screen" class="container" style="display: none; padding-top: 100px; text-align: center;">
        <div class="glass-card fade-in" style="max-width: 400px; margin: 0 auto;">
            <span class="badge" style="color: #ff4444; border-color: #ff4444;">UNAUTHORIZED</span>
            <h2 style="margin-top: 2rem;">Vault Locked</h2>
            <p style="color: var(--text-secondary); margin-top: 1rem;">Valid qualification token required to access NUC7
                curriculum.</p>
            <a href="index.html" class="cta-btn" style="display: block; margin-top: 2rem;">Acquire License</a>
        </div>
    </div>

    <div id="course-portal" class="container" style="display: none; flex-direction: row; align-items: flex-start;">
        <aside class="course-nav">
            <span class="badge" style="width: 100%; text-align: center;">CURRICULUM</span>
            <div id="chapters">
                <!-- Chapters -->
            </div>
        </aside>
        <main class="content-area">
            <div id="ch-content" class="fade-in">
                <!-- Content -->
            </div>
        </main>
    </div>

    <script>
        const layers = [
            { id: 1, name: "Physical Layer", text: "The foundation. Raw bits over electrical, optical, or radio signals." },
            { id: 2, name: "Data Link Layer", text: "MAC addresses and frames. The logic of the single hop." },
            { id: 3, name: "Network Layer", text: "IP Routing. The global interconnectivity of packets." },
            { id: 4, name: "Transport Layer", text: "TCP/UDP. End-to-end reliability and flow control." },
            { id: 5, name: "Session Layer", text: "Dialog control. Managing the conversation state." },
            { id: 6, name: "Presentation Layer", text: "Data translation. Encryption and syntax formatting." },
            { id: 7, name: "Application Layer", text: "User interaction. HTTP, DNS, and service protocols." }
        ];

        window.onload = () => {
            const token = new URLSearchParams(window.location.search).get('token');
            if (!token) {
                document.getElementById('lock-screen').style.display = 'block';
            } else {
                document.getElementById('course-portal').style.display = 'flex';
                init();
            }
        };

        function init() {
            const list = document.getElementById('chapters');
            list.innerHTML = layers.map(l => `
                <div class="ch-item" id="nav-${l.id}" onclick="show(${l.id})">
                    <span style="font-weight: 200; font-size: 0.8rem; display: block; opacity: 0.5;">LAYER 0${l.id}</span>
                    ${l.name}
                </div>
            `).join('');
            show(1);
        }

        function show(id) {
            const l = layers.find(x => x.id === id);
            document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${id}`).classList.add('active');

            const area = document.getElementById('ch-content');
            area.style.opacity = '0';
            setTimeout(() => {
                area.innerHTML = `
                    <span class="badge">Module 0${l.id}</span>
                    <h1 style="font-size: 4rem; font-weight: 200; margin-bottom: 2rem;">${l.name}</h1>
                    <p style="font-size: 1.2rem; color: var(--text-secondary); line-height: 2;">${l.text}</p>
                    <div style="margin-top: 5rem; padding: 3rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px;">
                        <h4 style="margin-bottom: 1rem;">Core Deep-Dive</h4>
                        <p style="color: var(--text-secondary); font-size: 0.95rem;">[Comprehensive curriculum content for ${l.name} will be expanded here based on vault data.]</p>
                    </div>
                    <div style="margin-top: 4rem;">
                        ${id < 7 ? `<button class="cta-btn" onclick="show(${id + 1})">Next Module</button>` : `<button class="outline-btn" onclick="location.href='index.html'">Complete Mastery</button>`}
                    </div>
                `;
                area.style.opacity = '1';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 200);
        }
    </script>
</body>

</html>
