<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUC7 | Networking Mastery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        .course-nav {
            width: 300px;
            height: calc(100vh - 80px);
            position: sticky;
            top: 80px;
            padding: 2rem;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(5, 5, 5, 0.3);
            backdrop-filter: blur(20px);
        }

        .ch-item {
            padding: 1rem;
            cursor: pointer;
            border-radius: 12px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            transition: var(--transition);
        }

        .ch-item:hover,
        .ch-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .content-area {
            flex: 1;
            padding: 5rem;
            max-width: 900px;
        }
    </style>
</head>

<body style="padding-top: 80px;">
    <nav class="navbar">
        <div class="container nav-container">
            <span class="nav-logo">NUC7</span>
            <div class="nav-links"><a href="index.html">Log Out</a></div>
        </div>
    </nav>

    <div id="lock-screen" class="container" style="display: none; padding-top: 100px; text-align: center;">
        <div class="glass-card fade-in" style="max-width: 450px; margin: 0 auto; border-color: rgba(255,68,68,0.2);">
            <span class="badge" style="color: #ff4444; border-color: #ff4444; margin-bottom: 2rem;">VAULT STATUS:
                LOCKED</span>
            <h2 style="font-weight: 200; font-size: 2.5rem; margin-bottom: 1rem;">Access <span
                    style="font-weight: 600;">Denied</span></h2>
            <p style="color: var(--text-secondary); margin-bottom: 3rem; font-size: 0.9rem; line-height: 1.6;">A valid
                qualification token is required to decrypt and access the NUC7 curriculum database.</p>

            <div id="recovery-form" style="margin-bottom: 2rem;">
                <input type="email" id="recover-email" placeholder="Enter enrolled email"
                    style="margin-bottom: 1rem; text-align: center;">
                <button onclick="requestToken()" id="recover-btn" class="outline-btn"
                    style="width: 100%; padding: 0.8rem;">Resend Access Link</button>
            </div>

            <div style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5rem;">
                <a href="index.html" style="font-size: 0.8rem; color: #fff; text-decoration: none; opacity: 0.5;">New
                    Candidate? Register Here</a>
            </div>
        </div>
    </div>

    <div id="course-portal" class="container" style="display: none; flex-direction: row; align-items: flex-start;">
        <aside class="course-nav">
            <span class="badge" style="width: 100%; text-align: center;">CURRICULUM</span>
            <div id="chapters">
                <!-- Chapters -->
            </div>
        </aside>
        <main class="content-area">
            <div id="ch-content" class="fade-in">
                <!-- Content -->
            </div>
        </main>
    </div>

    <script>
        const layers = [
            {
                "id": 1,
                "name": "Layer 1: The Physical Layer",
                "text": "The foundation of all communication. It deals with raw bits (0s and 1s) and physical hardware.",
                "html": "\n      <h3>Welcome to the Physical Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        The Physical Layer is the lowest layer of the OSI model, representing the actual physical hardware and transmission technologies of a network. It provides mechanical, electrical, and other functional aids to transmit raw bits across a physical medium.\n      </p>\n      \n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #4a90e2;\">\n        <h4 style=\"margin-bottom: 1rem; color: #4a90e2;\">The Main Analogy: The Infrastructure</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          Think of the physical layer as the roads, electrical lines, or railroad tracks connecting cities. The shapes of connectors, frequencies to broadcast on, and modulation schemes are specified here. Whether you use a copper cable, fiber-optic light, or electromagnetic waves (wireless), the physical layer makes it happen.\n        </p>\n      </div>\n\n      <h4>Core Services & Functions</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>Transmission of Bits:</strong> Bit-by-bit or symbol-by-symbol delivery across wired or wireless paths.</li>\n        <li><strong>Physical Aspects:</strong> Deals with electrical signals, optical signals (laser/fiber), electromagnetic waves, line coding, and bit synchronization.</li>\n        <li><strong>Network Topology:</strong> Defines whether the network is a bus, ring, mesh, or star setup.</li>\n        <li><strong>Hardware Devices:</strong> Includes cables, plugs, repeaters, hubs, network adapters, amplifiers, and transceivers.</li>\n      </ul>\n    "
            },
            {
                "id": 2,
                "name": "Layer 2: The Data Link Layer",
                "text": "Giving bits meaning. The Data Link layer organizes data into frames and handles local delivery.",
                "html": "\n      <h3>Welcome to the Data Link Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        The Data Link Layer ensures reliable, largely error-free transmission between adjacent network nodes. It divides raw bits into blocks called <strong>Frames</strong> and handles media access control (MAC).\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #4ade80;\">\n        <h4 style=\"margin-bottom: 1rem; color: #4ade80;\">The Main Analogy: The Local Neighborhood Cop</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          The Data Link layer acts like a neighborhood traffic cop, arbitrating between parties contending for access to a medium without concern for their ultimate, global destination. It focuses strictly on local delivery within a LAN or WAN segment.\n        </p>\n      </div>\n\n      <h4>Core Services & Functions</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>MAC Addressing:</strong> Uses physical addressing to ensure data reaches the correct recipient on the same local network.</li>\n        <li><strong>Framing & Sync:</strong> Encapsulates data into frames, adding checksums for channel coding. If a frame is corrupt, it is detected and dropped.</li>\n        <li><strong>Logical Link & Flow Control:</strong> Dynamically controls sending speeds to prevent overwhelming a receiver and specifies how devices detect and recover from collisions.</li>\n        <li><strong>Hardware & Protocols:</strong> Network Switches (multiport bridges) and Bridges operate here. Common protocols are Ethernet, PPP, and HDLC. It also handles VLANs.</li>\n      </ul>\n    "
            },
            {
                "id": 3,
                "name": "Layer 3: The Network Layer",
                "text": "Routing and global reach. The network layer gets your data across the world using IP Addresses.",
                "html": "\n      <h3>Welcome to the Network Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        The Network Layer is responsible for packet forwarding and routing through intermediate routers. It provides cross-network addresses and manages Quality of Service (QoS) to establish global reach between a source and a destination host.\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #f87171;\">\n        <h4 style=\"margin-bottom: 1rem; color: #f87171;\">The Main Analogy: The Global Postal System</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          When you send a message, it rarely goes straight to the exact target. Routers look at the destination IP address, search their routing tables, and forward the packet step-by-step (hop-by-hop) across the world until it reaches the destination network.\n        </p>\n      </div>\n\n      <h4>Core Services & Functions</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>Host Addressing:</strong> Uses logical addresses like IPv4 and IPv6 to give every host a unique, cross-network identity.</li>\n        <li><strong>Routing & Forwarding:</strong> Builds and updates routing tables to actively forward discrete packets through the best possible path.</li>\n        <li><strong>Fragmentation:</strong> Can fragment data packets if the underlying Layer 2 frame size is too small for a full packet.</li>\n        <li><strong>Protocols:</strong> IP (v4/v6), ICMP (for pings), RIP, OSPF, and BGP.</li>\n      </ul>\n    "
            },
            {
                "id": 4,
                "name": "Layer 4: The Transport Layer",
                "text": "End-to-end reliability, multiplexing, and flow control. Sending your data via ports.",
                "html": "\n      <h3>Welcome to the Transport Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        The Transport Layer provides the upper application-oriented layers with a standardized interface to the network. It handles host-to-host communication, segmentation, congestion avoidance, and port multiplexing.\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #a78bfa;\">\n        <h4 style=\"margin-bottom: 1rem; color: #a78bfa;\">The Main Analogy: The Certified Courier</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          Imagine trying to send an entire encyclopedia. You break it into numbered segments. At the destination, the Courier sorts it back into order, requests re-transmission for missing pages, and guarantees exact placement. It also assigns \"Ports\" so the encyclopedia goes to the right desk.\n        </p>\n      </div>\n\n      <h4>Core Services & Functions</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>Two Titans (TCP vs UDP):</strong> TCP provides connection-oriented, highly reliable transmission with stateful design and flow control. UDP provides fast, simple, connectionless messaging.</li>\n        <li><strong>Port Multiplexing:</strong> Assigns layer 4 addresses (ports) to data segments so a single computer can handle web traffic, emails, and gaming simultaneously.</li>\n        <li><strong>Reliability & Order:</strong> Guarantees the same order of delivery and solves transmission bottlenecks with congestion avoidance.</li>\n      </ul>\n    "
            },
            {
                "id": 5,
                "name": "Layer 5: The Session Layer",
                "text": "Keeping the conversation organized. The Session layer builds, controls, and synchronizes dialogues.",
                "html": "\n      <h3>Welcome to the Session Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        The Session Layer provides a mechanism for opening, closing, and managing a \"session\" between end-user application processes. It handles the organized and synchronized data exchange that makes up an ongoing dialogue.\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #fbbf24;\">\n        <h4 style=\"margin-bottom: 1rem; color: #fbbf24;\">The Main Analogy: The Telephone Operator / Secretary</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          Like a secretary managing a difficult meeting, it determines who is allowed to talk and when (full-duplex vs half-duplex), tracks authentication, and provides fail-safes so the meeting doesn't have to restart entirely if interrupted.\n        </p>\n      </div>\n\n      <h4>Core Services & Functions</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>Checkpoints (Synchronization Points):</strong> In a massive file transfer, it introduces recovery points. If a connection fails, it can resume precisely from the checkpoint without starting over.</li>\n        <li><strong>Security & State:</strong> Manages Authentication, Authorization, and Session Restoration.</li>\n        <li><strong>Protocols:</strong> RPC (Remote Procedure Call), SCP, and ZIP (Zone Information Protocol).</li>\n      </ul>\n    "
            },
            {
                "id": 6,
                "name": "Layer 6: The Presentation Layer",
                "text": "Formatting, decoding, and encryption. Assuring data syntax and semantics are shared.",
                "html": "\n      <h3>Welcome to the Presentation Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        The Presentation Layer sets the system-dependent representation of data into an independent, universal form. It relieves the application layer of syntax differences between end-user systems, enabling smooth exchanges regardless of underlying architecture.\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #2dd4bf;\">\n        <h4 style=\"margin-bottom: 1rem; color: #2dd4bf;\">The Main Analogy: The Universal Translator & Encryptor</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          If an obsolete mainframe speaks EBCDIC and a modern PC speaks ASCII, Layer 6 translates it. If a bank app requires secrecy, Layer 6 encrypts it before sending and decrypts when receiving. It standardizes the dialect.\n        </p>\n      </div>\n\n      <h4>Core Services & Functions</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>Data Conversion & Formatting:</strong> Deals with string representation, character coding, and serialization of complex data structures (like XML, JSON, or ASN.1).</li>\n        <li><strong>Security:</strong> The prime location for Encryption and Decryption (like TLS/SSL for secure banking).</li>\n        <li><strong>Compression:</strong> Squeezes data down for more efficient transit.</li>\n        <li><strong>Sublayers:</strong> Composed of CASE (Common Application Service Element) and SASE (Specific Application Service Element).</li>\n      </ul>\n    "
            },
            {
                "id": 7,
                "name": "Layer 7: The Application Layer",
                "text": "The Top Level API. The layer providing user-interface elements and top-level services.",
                "html": "\n      <h3>Welcome to the Application Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        The Application Layer is the top abstraction layer. While TCP/IP views this broadly, the OSI model specifically defines it as the user interface responsible for bringing network services to the applications. It doesn't contain the application itself (like Chrome), but rather the actual network protocols the app relies on.\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #f472b6;\">\n        <h4 style=\"margin-bottom: 1rem; color: #f472b6;\">The Main Analogy: The Network Interface</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          It is the doorway through which humans and software enter the network. Here is where your web browser speaks HTTP to fetch a website, or your mail client speaks SMTP to send an email. You interact directly with the fruits of Layer 7.\n        </p>\n      </div>\n\n      <h4>Core Services & Functions</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>Process-to-Process:</strong> Standardizes communications used by internet hosts and handles data input/output.</li>\n        <li><strong>Services:</strong> Web browsing, application networking, network management, and file transfers.</li>\n        <li><strong>Prominent Protocols:</strong> HTTP/HTTPS, FTP, SMTP/POP3/IMAP, and DNS.</li>\n      </ul>\n    "
            }
        ];
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const email = params.get('email');
        const BRIDGE_URL = 'https://nuc7-auth-bridge.alivirgo123.workers.dev';

        window.onload = async () => {
            if (params.get('dev') === 'true') {
                document.getElementById('course-portal').style.display = 'flex';
                init();
                return;
            }

            if (!token || !email) {
                document.getElementById('lock-screen').style.display = 'block';
                return;
            }

            // Verify Token with Bridge
            try {
                const res = await fetch(`${BRIDGE_URL}/validate-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token })
                });

                if (res.ok) {
                    document.getElementById('course-portal').style.display = 'flex';
                    init();
                } else {
                    document.getElementById('lock-screen').style.display = 'block';
                }
            } catch (e) {
                // Fallback to simple check if bridge is down but token exists
                document.getElementById('course-portal').style.display = 'flex';
                init();
            }
        };

        async function requestToken() {
            const emailInput = document.getElementById('recover-email').value;
            const btn = document.getElementById('recover-btn');
            if (!emailInput) return;

            btn.disabled = true;
            btn.textContent = 'Contacting Registry...';

            try {
                await fetch(`${BRIDGE_URL}/send-registration`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput, name: 'Returning Student' })
                });
                alert('Access link dispatched to your inbox.');
            } catch (e) {
                alert('Connection error.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Resend Access Link';
            }
        }

        function init() {
            const list = document.getElementById('chapters');
            list.innerHTML = layers.map(l => `
                <div class="ch-item" id="nav-${l.id}" onclick="show(${l.id})">
                    <span style="font-weight: 200; font-size: 0.8rem; display: block; opacity: 0.5;">LAYER 0${l.id}</span>
                    ${l.name}
                </div>
            `).join('');
            show(1);
        }

        async function trackProgress(chapterId) {
            if (!email || !token) return;
            fetch(`${BRIDGE_URL}/update-progress`, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, chapterId: `Layer ${chapterId}`, token })
            }).catch(() => { });
        }

        function show(id) {
            if (lockedLayers.includes(id)) {
                alert("Security Clearance Required: You must achieve a perfect score on the previous layer's evaluation to unlock this module.");
                return;
            }
            const l = layers.find(x => x.id === id);
            document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
            const sideItem = document.getElementById(`nav-${id}`);
            if (sideItem) sideItem.classList.add('active');

            trackProgress(id);

            const area = document.getElementById('ch-content');
            area.style.opacity = '0';
            setTimeout(() => {
                area.innerHTML = `
                    <span class="badge">Module 0${l.id}</span>
                    <h1 style="font-size: 4rem; font-weight: 200; margin-bottom: 2rem;">${l.name}</h1>
                    <p style="font-size: 1.2rem; color: var(--text-secondary); line-height: 2;">${l.text}</p>
                    <div style="margin-top: 5rem; padding: 3rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px;">
                        <h4 style="margin-bottom: 1rem;">Core Deep-Dive</h4>
                        ${l.html}
                    </div>
                    <div style="margin-top: 2rem; text-align: center;">
                        <button class="cta-btn" onclick="loadQuiz(${l.id})">Take Quiz</button>
                    </div>
                    <div id="quiz-container" style="margin-top: 2rem; display:none; background: rgba(50,50,50,0.5); padding: 2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);"></div>
                    <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05); text-align: center;">
                        ${id < layers.length
                        ? `<button class="cta-btn" id="next-module-btn" ${lockedLayers.includes(id + 1) ? 'disabled' : ''} onclick="show(${id + 1})" style="opacity: ${lockedLayers.includes(id + 1) ? '0.5' : '1'};">Next Module ${lockedLayers.includes(id + 1) ? '(Locked)' : ''}</button>`
                        : `<button class="outline-btn" id="next-module-btn" onclick="generateCertificate()">Generate Certificate</button>`}
                    </div>
                `;
                area.style.opacity = '1';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 200);
        }

        // --- QUIZ AND LOCKING LOGIC ---
        let lockedLayers = window.location.search.includes('dev=true') ? [] : [2, 3, 4, 5, 6, 7];

        async function loadQuiz(layerId) {
            const container = document.getElementById('quiz-container');
            container.style.display = 'block';
            container.innerHTML = '<p class="fade-in">Loading quiz connection to NUC7 Vault...</p>';
            try {
                const res = await fetch(`${BRIDGE_URL}/get-questions?layer=${layerId}`);
                if (!res.ok) throw new Error("Vault Connection Error");
                const questions = await res.json();
                renderQuiz(questions, layerId);
            } catch (e) {
                container.innerHTML = '<p class="fade-in" style="color:#f87171;">Failed to connect to NUC7 Vault.</p>';
            }
        }

        function renderQuiz(questions, layerId) {
            const container = document.getElementById('quiz-container');
            let html = `<h3 style="margin-bottom: 1rem;">Evaluation: Layer ${layerId}</h3>`;
            html += '<form id="quiz-form">';
            questions.forEach((q, i) => {
                html += `<div class="quiz-question" style="margin-bottom: 1.5rem;">
                            <p style="font-weight: 600; margin-bottom: 0.5rem; font-size: 1.1rem;">${i + 1}. ${q.question}</p>`;
                q.options.forEach((opt, idx) => {
                    html += `<label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); cursor: pointer;">
                                <input type="radio" name="${q.id}" value="${idx}" required style="width: auto; margin-right: 0.5rem;"> 
                                ${opt}
                             </label>`;
                });
                html += '</div>';
            });
            html += `<button type="submit" class="cta-btn" id="quiz-submit-btn">Submit Answers</button></form>`;
            container.innerHTML = html;

            document.getElementById('quiz-form').addEventListener('submit', async e => {
                e.preventDefault();
                const btn = document.getElementById('quiz-submit-btn');
                btn.disabled = true;
                btn.textContent = "Evaluating...";

                const formData = new FormData(e.target);
                const answers = {};
                for (let [key, value] of formData.entries()) {
                    answers[key] = Number(value);
                }
                try {
                    const res = await fetch(`${BRIDGE_URL}/evaluate-quiz`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ answers })
                    });
                    const result = await res.json();
                    showResults(result, layerId);
                } catch (err) {
                    btn.disabled = false;
                    btn.textContent = "Submit Answers";
                    alert("Error evaluating quiz.");
                }
            });
        }

        function showResults(result, layerId) {
            const container = document.getElementById('quiz-container');
            let html = `<h3 style="margin-bottom: 1rem;">Evaluation Results: ${result.score}/${result.total}</h3>`;

            result.results.forEach(r => {
                if (r.correct) {
                    html += `<div style="margin-bottom: 1rem; padding: 1rem; background: rgba(74, 222, 128, 0.1); border-left: 4px solid #4ade80; border-radius: 0 8px 8px 0;">
                                <p style="color:#4ade80; margin:0;"><strong>Question ${r.id.split('_')[1]}: Correct</strong></p>
                             </div>`;
                } else {
                    html += `<div style="margin-bottom: 1rem; padding: 1rem; background: rgba(248, 113, 113, 0.1); border-left: 4px solid #f87171; border-radius: 0 8px 8px 0;">
                                <p style="color:#f87171; margin-bottom: 0.5rem;"><strong>Question ${r.id.split('_')[1]}: Incorrect</strong></p>
                                <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 0.2rem;">Correct Answer: Option ${r.correctAnswer + 1}</p>
                                <p style="color: var(--text-secondary); font-size: 0.95rem; margin:0;"><em>Explanation: ${r.explanation}</em></p>
                             </div>`;
                }
            });

            if (result.score === result.total) {
                html += `<div style="margin-top: 2rem; text-align: center;"><p style="color: #4ade80; font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem;">Perfect Score! Security clearance updated.</p></div>`;
                container.innerHTML = html;
                unlockNext(layerId);
            } else {
                html += `<div style="margin-top: 2rem; text-align: center;"><p style="color: #f87171; font-weight: 600; margin-bottom: 1rem;">You need a perfect score to proceed.</p><button class="outline-btn" onclick="loadQuiz(${layerId})">Retake Quiz</button></div>`;
                container.innerHTML = html;
            }
        }

        function unlockNext(currentId) {
            const btn = document.getElementById('next-module-btn');
            if (btn) {
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.textContent = currentId < layers.length ? "Next Module" : "Generate Certificate";
            }
            if (currentId < layers.length) {
                lockedLayers = lockedLayers.filter(x => x !== currentId + 1);
            }
        }

        // --- CERTIFICATE GENERATION ---
        function generateCertificate() {
            const doc = new jspdf.jsPDF();

            // Add some styling
            doc.setFillColor(10, 10, 10);
            doc.rect(0, 0, 210, 297, 'F'); // A4 black background

            doc.setTextColor(255, 255, 255);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(28);
            doc.text('NUC7 NETWORKING MASTERY', 105, 50, { align: 'center' });

            doc.setDrawColor(74, 144, 226); // Blue line
            doc.setLineWidth(1);
            doc.line(40, 60, 170, 60);

            doc.setFont("helvetica", "normal");
            doc.setFontSize(16);
            doc.text('This certifies that', 105, 90, { align: 'center' });

            doc.setFont("helvetica", "bold");
            doc.setFontSize(24);
            doc.text(email.toUpperCase(), 105, 110, { align: 'center' });

            doc.setFont("helvetica", "normal");
            doc.setFontSize(16);
            doc.text('has successfully completed the NUC7 7-Layer OSI Curriculum', 105, 130, { align: 'center' });
            doc.text('and passed all secure evaluations.', 105, 140, { align: 'center' });

            const date = new Date().toLocaleDateString();
            doc.setFontSize(14);
            doc.setTextColor(150, 150, 150);
            doc.text(`Date of Completion: ${date}`, 105, 200, { align: 'center' });
            doc.text(`Verification ID: ${token.substring(0, 8)}`, 105, 210, { align: 'center' });

            doc.save('NUC7_Certification.pdf');
        }
    </script>
