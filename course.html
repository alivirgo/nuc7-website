<!DOCTYPE html>
<html lang="en">

<head>

    <style>

</head>

<body style="padding-top: 80px;">
    <nav class="navbar">
        <div class="container nav-container">
            <span class="nav-logo">NUC7</span>
            <div class="nav-links"><a href="index.html">Log Out</a></div>

    <div id="lock-screen" class="container" style="display: none; padding-top: 100px; text-align: center;">
        <div class="glass-card fade-in" style="max-width: 450px; margin: 0 auto; border-color: rgba(255,68,68,0.2);">
            <span class="badge" style="color: #ff4444; border-color: #ff4444; margin-bottom: 2rem;">VAULT STATUS:
                LOCKED</span>

                    style="font-weight: 600;">Denied</span></h2>

                qualification token is required to decrypt and access the NUC7 curriculum database.</p>

            <div id="recovery-form" style="margin-bottom: 2rem;">
                <input type="email" id="recover-email" placeholder="Enter enrolled email"
                    style="margin-bottom: 1rem; text-align: center;">

                    style="width: 100%; padding: 0.8rem;">Resend Access Link</button>

                <a href="index.html" style="font-size: 0.8rem; color: #fff; text-decoration: none; opacity: 0.5;">New
                    Candidate? Register Here</a>

    <div id="course-portal" class="container" style="display: none; flex-direction: row; align-items: flex-start;">
        <aside class="course-nav">
            <span class="badge" style="width: 100%; text-align: center;">CURRICULUM</span>

                <!-- Chapters -->

            <div id="ch-content" class="fade-in">
                <!-- Content -->

    </div>

    <script>
        const layers = [
  {
    "id": 1,
    "name": "Layer 1: The Physical Layer",
    "text": "The foundation of all communication. It deals with the raw, physical components of the network.",
    "html": "\n      <h3>Welcome to the Physical Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        The Physical Layer is the lowest layer of the OSI model, representing the actual physical hardware and wiring that makes up a network. It doesn't care about what the data means; its only job is to transmit raw, unstructured bits (0s and 1s) across a physical medium.\n      </p>\n      \n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #4a90e2;\">\n        <h4 style=\"margin-bottom: 1rem; color: #4a90e2;\">The Main Analogy: The Roads and Highways</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          Think of the physical layer as the asphalt roads, the electrical lines, or the railroad tracks connecting different cities. It is the raw infrastructure. Whether you are deeply philosophical (sending highly complex data) or just sending a postcard (a simple ping), you still need a road to travel on.\n        </p>\n      </div>\n\n      <h4>What happens here?</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>Transmission of Bits:</strong> Information at this layer is completely unstructured. It's just an endless stream of binary data.</li>\n        <li><strong>Electrical & Optical Signals:</strong> The physical layer defines how those 0s and 1s are represented. On copper wires, they are represented by pulses of electricity (voltage spikes). On fiber-optic cables, they are flashes of light. Over Wi-Fi, they are radio frequencies.</li>\n        <li><strong>Hardware Devices:</strong> This layer includes cables (Ethernet, fiber, coaxial), hubs, repeaters, and network adapters.</li>\n      </ul>\n\n      <h4>Why is it important?</h4>\n      <p style=\"color: var(--text-secondary); line-height: 1.8;\">\n        Without the physical layer, your bits literally have nowhere to go. If a cable is cut or your Wi-Fi signal drops, communication is instantly severed. All the advanced software and protocols in the world are useless if the physical copper or light cannot reach the other side.\n      </p>\n    "
  },
  {
    "id": 2,
    "name": "Layer 2: The Data Link Layer",
    "text": "Giving bits meaning. The Data Link layer organizes data into frames and handles local delivery.",
    "html": "\n      <h3>Welcome to the Data Link Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        While the Physical Layer just sends light or electricity blindly, the Data Link Layer is the first layer of intelligence. It takes that raw stream of 0s and 1s and packages them into organized chunks of data called <strong>Frames</strong>.\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #4ade80;\">\n        <h4 style=\"margin-bottom: 1rem; color: #4ade80;\">The Main Analogy: The Local Delivery Truck</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          Imagine a neighborhood where everyone knows each other. The Data Link layer is like the local mail carrier driving around recognizing everyone's home address (MAC addresses). The mail carrier doesn't care if the mail goes to another country eventually; their only job is delivering it to the next immediate stop in the same town.\n        </p>\n      </div>\n\n      <h4>What happens here?</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>MAC Addressing:</strong> Every network card has a physically burned-in address called a MAC Address. The Data Link layer uses this to ensure data reaches the correct device on the <em>local</em> network.</li>\n        <li><strong>Framing:</strong> It puts an envelope (a frame header and trailer) around the data so devices know where a piece of information starts and ends.</li>\n        <li><strong>Error Detection:</strong> When the physical layer sends electrical pulses over wire, interference can flip a 0 to a 1. The Data Link layer performs localized error checking (like a Checksum or CRC) to see if the frame arrived intact. If it's corrupted, it throws it away.</li>\n        <li><strong>Hardware Devices:</strong> Network Switches are the kings of Layer 2. A switch learns the MAC addresses of computers plugged into it and intelligently forwards frames only to the specific intended recipient.</li>\n      </ul>\n\n      <h4>Why is it important?</h4>\n      <p style=\"color: var(--text-secondary); line-height: 1.8;\">\n        Without Layer 2, computers on the same network switch would just be endlessly screaming at each other with electricity. Layer 2 brings order, addresses, and boundaries to local communication.\n      </p>\n    "
  },
  {
    "id": 3,
    "name": "Layer 3: The Network Layer",
    "text": "Routing and global reach. The network layer gets your data across the world using IP Addresses.",
    "html": "\n      <h3>Welcome to the Network Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        The Data Link layer is great for local delivery (within the same building or switch), but it terrible for global delivery. Layer 3, the Network Layer, introduces logical addressing (IP Addresses) and handles the routing of data across multiple different, interconnected networks—otherwise known as the Internet.\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #f87171;\">\n        <h4 style=\"margin-bottom: 1rem; color: #f87171;\">The Main Analogy: The GPS & Post Office System</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          If Layer 2 is the local mail carrier, Layer 3 is the global postal system. When you mail a letter to a different state, the post office looks at the Zip Code (IP Address). They don't know the exact house (they leave that to the local carrier in Layer 2), but they know the most efficient path—a plane, a train, or a highway—to get the letter to the destination state.\n        </p>\n      </div>\n\n      <h4>What happens here?</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>Logical Addressing (IP):</strong> Your device is assigned an IP Address (like 192.168.1.5 or an IPv6 address). This address can dynamically change, unlike a MAC address. The IP Address defines what global logical subnet you belong to.</li>\n        <li><strong>Packets:</strong> Data at Layer 3 is called a Packet. The Network layer takes data from above, slaps a Source IP and Destination IP on the front of it, and says \"Go forth.\"</li>\n        <li><strong>Routing:</strong> This is the main verb of Layer 3. Routers read the Destination IP of a packet, look at an internal map called a Routing Table, and forward the packet to the next best router. This happens hop-by-hop across the globe.</li>\n      </ul>\n\n      <h4>The Central Device: Rotuers</h4>\n      <p style=\"color: var(--text-secondary); line-height: 1.8;\">\n        Routers live at Layer 3. When a router receives a packet, it completely strips away the Layer 2 Frame, reads the Layer 3 IP Packet inside, decides where it needs to go next, puts it inside a completely new Layer 2 Frame, and sends it out.\n      </p>\n    "
  },
  {
    "id": 4,
    "name": "Layer 4: The Transport Layer",
    "text": "Reliability, sequence, and ports. This layer ensures all your data arrives exactly how it should.",
    "html": "\n      <h3>Welcome to the Transport Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        Layer 3 gets packets from Point A (your laptop) to Point B (a Netflix server in another country). However, Layer 3 doesn't guarantee delivery. Packets can get lost in transit, arrive completely out of order, or become duplicated. <strong>Layer 4 brings reliability and process-to-process communication.</strong>\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #a78bfa;\">\n        <h4 style=\"margin-bottom: 1rem; color: #a78bfa;\">The Main Analogy: The Certified Mail Room</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          Imagine you need to mail a 10,000-page manuscript to an editor. You can't fit it in one envelope. So you put it in 100 separate numbered envelopes. At the destination, the Transport layer opens the envelopes, puts page 1 next to page 2, notices that envelope #42 is missing, calls you up to resend <em>only</em> envelope #42, and then delivers the perfect stack of papers to the correct person in the office.\n        </p>\n      </div>\n\n      <h4>Two Massive Protocols: TCP vs UDP</h4>\n      <p style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 1rem;\">\n        Layer 4 relies predominantly on two protocols depending on what the application needs:\n      </p>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>TCP (Transmission Control Protocol):</strong> Highly reliable. It forces a 3-way handshake to establish a connection. It numbers every segment of data. If the receiver drops a segment, TCP demands a re-transmission. Excellent for web browsing, emails, and file downloads where missing data means corruption.</li>\n        <li><strong>UDP (User Datagram Protocol):</strong> Fast and ruthless. UDP just blasts data without caring if it arrives. It does not re-transmit lost data. Excellent for live video calls or multiplayer gaming, where old data is useless anyway and speed is paramount.</li>\n      </ul>\n\n      <h4>Ports: Directing Traffic</h4>\n      <p style=\"color: var(--text-secondary); line-height: 1.8;\">\n        Layer 3 gets the data to your computer. But how does your computer know if the data is for your Chrome tab or your Spotify app? Layer 4 uses <strong>Ports</strong>. Port 80 for HTTP, 443 for HTTPS, 25 for Email. Ports ensure the right application gets the right data.\n      </p>\n    "
  },
  {
    "id": 5,
    "name": "Layer 5: The Session Layer",
    "text": "Keeping the conversation alive. The Session layer manages the setup, maintenance, and teardown of dialogs.",
    "html": "\n      <h3>Welcome to the Session Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        We are now entering the upper echelons of the OSI model, which deal heavily with software rather than hardware. The Session Layer is responsible for establishing, managing, and gracefully terminating \"sessions\" or conversations between two endpoints.\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #fbbf24;\">\n        <h4 style=\"margin-bottom: 1rem; color: #fbbf24;\">The Main Analogy: The Telephone Operator</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          Imagine a phone call. The Physical layer is the wire. Layer 3 routed it to the right house. Layer 4 made sure you can hear them perfectly. But the Session layer is you picking up the phone, saying \"Hello\", carrying on the conversation, politely waiting for your turn to speak, and finally saying \"Goodbye\" and hanging up.\n        </p>\n      </div>\n\n      <h4>What happens here?</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>Dialog Control:</strong> It determines who talks and when. Can both computers talk at the same exact time (full-duplex)? Do they take turns (half-duplex)? The session layer coordinates this so applications don't talk over one another.</li>\n        <li><strong>Synchronization and Checkpointing:</strong> If you are downloading a massive 50 GB file, the session layer can add \"checkpoints\" to the stream. If the internet completely crashes at 49 GB, the session layer allows the system to resume exactly from the 49 GB mark rather than starting over from 0.</li>\n        <li><strong>Authentication and Authorization:</strong> While some of this is left to the application, maintaining the state of an authenticated user (like staying logged into a bank account for 10 minutes) relies heavily on session management.</li>\n      </ul>\n\n      <h4>Why is it important?</h4>\n      <p style=\"color: var(--text-secondary); line-height: 1.8;\">\n        Without the Session layer, your computer wouldn't know when a conversation was officially over or if it was suddenly dropped mid-sentence. It helps the operating system keep track of all the different active conversations happening in the background simultaneously.\n      </p>\n    "
  },
  {
    "id": 6,
    "name": "Layer 6: The Presentation Layer",
    "text": "Formatting and encryption. The Presentation layer guarantees data is readable by the receiving system.",
    "html": "\n      <h3>Welcome to the Presentation Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        The Presentation Layer serves as the network's translator. It doesn't care about routing or reliable delivery; its sole focus is on the syntax, semantics, and format of the data. It ensures that data sent from an application on one computer can actually be understood by an application on another computer.\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #2dd4bf;\">\n        <h4 style=\"margin-bottom: 1rem; color: #2dd4bf;\">The Main Analogy: The Universal Translator</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          Imagine an ambassador from a country speaking only French trying to speak to an ambassador speaking only Mandarin. The Presentation layer acts as the brilliant translator sitting between them, converting both languages into an agreed-upon, universal intermediate language (like English) to ensure total comprehension.\n        </p>\n      </div>\n\n      <h4>What happens here?</h4>\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>Character Conversion:</strong> Moving data between a mainframe (that might use EBCDIC encoding) and a modern PC (using ASCII or UTF-8). It translates the text so you see words, not weird symbols.</li>\n        <li><strong>Format standardization:</strong> This layer handles universally understood file formats. For images, that.s JPEG, GIF, or PNG. For videos, it's MP4. By using standardized data formats, a Windows computer can view the exact same image as an iPhone.</li>\n        <li><strong>Data Compression:</strong> To save massive amounts of bandwidth across the internet, the Presentation layer can squash large chunks of data down to a fraction of their size before transmitting, expanding it when it arrives.</li>\n        <li><strong>Encryption & Decryption:</strong> The most critical role of Layer 6 today. When you do online banking, the Presentation layer encrypts your plaintext password into an unreadable mathematical hash (via TLS/SSL). The router reads the packet, but the payload inside is totally scrambled until the destination server decrypts it.</li>\n      </ul>\n    "
  },
  {
    "id": 7,
    "name": "Layer 7: The Application Layer",
    "text": "The layer you see. The Application layer interacts directly with software applications and human users.",
    "html": "\n      <h3>Welcome to the Application Layer</h3>\n      <p style=\"color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.8;\">\n        We have arrived at the absolute top of the OSI model. The Application layer is the one closest to the end user. It provides network services directly to the software applications that you use every day, like your web browser or email client.\n      </p>\n\n      <div style=\"background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #f472b6;\">\n        <h4 style=\"margin-bottom: 1rem; color: #f472b6;\">The Main Analogy: The Human Writing the Letter</h4>\n        <p style=\"color: var(--text-secondary); line-height: 1.6;\">\n          If the entire OSI model is a post office infrastructure, Layer 7 is you—the human being with a pen, writing the actual letter, deciding who to send it to, and putting it into the mailbox. Without you, there is no message to send. Everything below you exists purely to serve your request.\n        </p>\n      </div>\n\n      <h4>What happens here?</h4>\n      <p style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 1.5rem;\">\n        Note that the Application layer is <strong>not</strong> the application itself. Google Chrome is not Layer 7. Rather, Layer 7 consists of the protocols that Google Chrome relies upon to fetch data.\n      </p>\n\n      <ul style=\"color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; margin-bottom: 2rem; padding-left: 1.5rem;\">\n        <li><strong>HTTP / HTTPS:</strong> The protocol governing how web pages are requested and sent.</li>\n        <li><strong>SMTP / POP3 / IMAP:</strong> The protocols that allow your mail client to send emails across the world to a server, and download new emails.</li>\n        <li><strong>FTP (File Transfer Protocol):</strong> Dedicated purely to moving large files between authorized servers.</li>\n        <li><strong>DNS (Domain Name System):</strong> The internet's phonebook, translating human-readable names like <em>nuc7.com</em> into Layer 3 IP Addresses so the rest of the model can do its job.</li>\n      </ul>\n\n      <h4>The OSI Journey Complete</h4>\n      <p style=\"color: var(--text-secondary); line-height: 1.8;\">\n        When you click \"Send\" on an email, the message drops down from Layer 7, getting encrypted at Layer 6, session-tagged at Layer 5, sliced into TCP segments at Layer 4, packetized with IP addresses at Layer 3, framed with MAC addresses at Layer 2, and shot out as light or electricity at Layer 1. On the receiving end, the process works in perfect reverse until the email pops up on someone else's screen.\n      </p>\n    "
  }
];
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const email = params.get('email');
        const BRIDGE_URL = 'https://nuc7-auth-bridge.alivirgo123.workers.dev';

        window.onload = async () => {
            if (params.get('dev') === 'true') {
                document.getElementById('course-portal').style.display = 'flex';
                init();
                return;
            }

            if (!token || !email) {
                document.getElementById('lock-screen').style.display = 'block';
                return;
            }

            // Verify Token with Bridge
            try {
                const res = await fetch(`${BRIDGE_URL}/validate-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token })
                });

                if (res.ok) {
                    document.getElementById('course-portal').style.display = 'flex';
                    init();
                } else {
                    document.getElementById('lock-screen').style.display = 'block';
                }
            } catch (e) {
                // Fallback to simple check if bridge is down but token exists
                document.getElementById('course-portal').style.display = 'flex';
                init();
            }
        };

        async function requestToken() {
            const emailInput = document.getElementById('recover-email').value;
            const btn = document.getElementById('recover-btn');
            if (!emailInput) return;

            btn.disabled = true;
            btn.textContent = 'Contacting Registry...';

            try {
                await fetch(`${BRIDGE_URL}/send-registration`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput, name: 'Returning Student' })
                });
                alert('Access link dispatched to your inbox.');
            } catch (e) {
                alert('Connection error.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Resend Access Link';
            }
        }

        function init() {
            const list = document.getElementById('chapters');
            list.innerHTML = layers.map(l => `
                <div class="ch-item" id="nav-${l.id}" onclick="show(${l.id})">
                    <span style="font-weight: 200; font-size: 0.8rem; display: block; opacity: 0.5;">LAYER 0${l.id}</span>
                    ${l.name}
                </div>
            `).join('');
            show(1);
        }

        async function trackProgress(chapterId) {
            if (!email || !token) return;
            fetch(`${BRIDGE_URL}/update-progress`, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, chapterId: `Layer ${chapterId}`, token })
            }).catch(() => { });
        }

        function show(id) {
            const l = layers.find(x => x.id === id);
            document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
            const sideItem = document.getElementById(`nav-${id}`);
            if (sideItem) sideItem.classList.add('active');

            trackProgress(id);

            const area = document.getElementById('ch-content');
            area.style.opacity = '0';
            setTimeout(() => {
                area.innerHTML = `
                    <span class="badge">Module 0${l.id}</span>
                    <h1 style="font-size: 4rem; font-weight: 200; margin-bottom: 2rem;">${l.name}</h1>
                    <p style="font-size: 1.2rem; color: var(--text-secondary); line-height: 2;">${l.text}</p>
                    <div style="margin-top: 5rem; padding: 3rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px;">
                        <h4 style="margin-bottom: 1rem;">Core Deep-Dive</h4>
                        ${l.html}
                    </div>
                    <div style="margin-top: 4rem;">
                        ${id < layers.length ? `<button class="cta-btn" onclick="show(${id + 1})">Next Module</button>` : `<button class="outline-btn" onclick="location.href='index.html'">Complete Mastery</button>`}
                    </div>
                `;
                area.style.opacity = '1';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 200);
        }
    </script>
</body>

</html>
