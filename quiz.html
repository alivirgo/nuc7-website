<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUC7 | Qualification Assessment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
</head>

<body style="padding-top: 100px;">
    <nav class="navbar">
        <div class="container nav-container">
            <span class="nav-logo">NUC7</span>
            <div class="nav-links"><a href="index.html">Exit Quiz</a></div>
        </div>
    </nav>

    <div class="container" style="max-width: 700px;">
        <div id="quiz-pre" class="glass-card fade-in" style="text-align: center;">
            <span class="badge">SECURE CHALLENGE</span>
            <h2 style="margin-bottom: 2rem;">Qualification Assessment</h2>
            <p style="color: var(--text-secondary); margin-bottom: 3rem;">You must score at least 7/10 to unlock the
                NUC7 Networking course. The questions are pulled from our secure vault.</p>
            <button onclick="startQuiz()" class="cta-btn" id="start-btn">Initialize Connection</button>
            <div style="margin-top: 1.5rem;">
                <button onclick="skipQuiz()" id="skip-btn" class="outline-btn"
                    style="padding: 0.6rem 2rem; font-size: 0.9rem; color: #888; border-color: rgba(255,255,255,0.1);">Skip
                    Assessment & Start Course Directly</button>
            </div>
        </div>

        <div id="quiz-run" style="display: none;">
            <div
                style="height: 4px; background: rgba(255,255,255,0.05); margin-bottom: 3rem; border-radius: 2px; overflow: hidden;">
                <div id="progress" style="height: 100%; background: #fff; width: 0%; transition: width 0.3s ease;">
                </div>
            </div>
            <div id="q-card" class="glass-card fade-in">
                <!-- Q content here -->
            </div>
            <div
                style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center; padding: 0 1rem;">
                <span id="q-count"
                    style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">Question
                    1 of 10</span>
                <button id="next-btn" class="cta-btn" style="padding: 0.6rem 2rem;" disabled>Next</button>
            </div>
        </div>

        <div id="quiz-end" class="glass-card fade-in" style="display: none; text-align: center;">
            <!-- Result here -->
        </div>
    </div>

    <script>
        const BRIDGE_URL = 'https://nuc7-auth-bridge.alivirgo123.workers.dev';
        let questions = [];
        let cur = 0;
        let selected = null;
        let score = 0;

        async function startQuiz() {
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            btn.textContent = 'Syncing Vault...';

            const courseId = new URLSearchParams(window.location.search).get('course') || 'osi-model';
            try {
                const res = await fetch(`${BRIDGE_URL}/get-questions?course=${courseId}`);
                questions = await res.json();
                document.getElementById('quiz-pre').style.display = 'none';
                document.getElementById('quiz-run').style.display = 'block';
                render();
            } catch (err) {
                alert('Vault Synchronization Failed. Check Bridge Status.');
                btn.disabled = false;
                btn.textContent = 'Retry Connection';
            }
        }

        function render() {
            const q = questions[cur];
            const card = document.getElementById('q-card');
            card.innerHTML = `
                <h3 style="font-weight: 200; margin-bottom: 3rem; font-size: 1.5rem;">${q.question}</h3>
                <div style="display: grid; gap: 1rem;">
                    ${q.options.map((o, i) => `
                        <button class="outline-btn" style="text-align: left; padding: 1.2rem; font-weight: 400; font-size: 0.95rem; display: block; width: 100%;" onclick="select(${i}, this)">${o}</button>
                    `).join('')}
                </div>
            `;
            document.getElementById('q-count').textContent = `Question ${cur + 1} of ${questions.length}`;
            document.getElementById('progress').style.width = `${((cur + 1) / questions.length) * 100}%`;
            document.getElementById('next-btn').disabled = true;
            selected = null;
        }

        window.select = (idx, el) => {
            selected = idx;
            document.querySelectorAll('#q-card button').forEach(b => {
                b.style.background = 'transparent';
                b.style.color = '#fff';
            });
            el.style.background = '#fff';
            el.style.color = '#000';
            document.getElementById('next-btn').disabled = false;
        };

        document.getElementById('next-btn').addEventListener('click', () => {
            if (selected === questions[cur].answer) score++;

            if (cur < questions.length - 1) {
                cur++;
                render();
            } else {
                finish();
            }
        });

        async function finish() {
            document.getElementById('quiz-run').style.display = 'none';
            const end = document.getElementById('quiz-end');
            end.style.display = 'block';

            if (score >= 7) {
                const email = new URLSearchParams(window.location.search).get('email') || 'candidate@nuc7.dev';
                end.innerHTML = `
                    <span class="badge" style="background: rgba(68, 255, 68, 0.1); border-color: rgba(68, 255, 68, 0.2); color: #44ff44;">Qualified</span>
                    <h2 style="margin-bottom: 2rem;">Assessment Success</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 3rem;">Congratulations. You scored ${score}/${questions.length}. Proceed to the secure course portal.</p>
                    <button id="unlock-btn" class="cta-btn" onclick="unlock()">Unlock Course Portal</button>
                `;
            } else {
                end.innerHTML = `
                    <span class="badge" style="background: rgba(255, 68, 68, 0.1); border-color: rgba(255, 68, 68, 0.2); color: #ff4444;">Denied</span>
                    <h2 style="margin-bottom: 2rem;">Assessment Failure</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 3rem;">Score: ${score}/${questions.length}. A minimum of 7/10 is required for NUC7 selection. Review the layers and try again.</p>
                    <button onclick="location.reload()" class="cta-btn">Retry Assessment</button>
                `;
            }
        }

        async function unlock() {
            const btn = document.getElementById('unlock-btn');
            const email = new URLSearchParams(window.location.search).get('email') || 'candidate@nuc7.dev';
            btn.disabled = true;
            btn.textContent = 'Generating Access Token...';

            try {
                const courseId = new URLSearchParams(window.location.search).get('course') || 'osi-model';
                const res = await fetch(`${BRIDGE_URL}/get-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, score, courseId })
                });
                const { token } = await res.json();
                location.href = `course.html?id=${courseId}&token=${token}&email=${encodeURIComponent(email)}`;
            } catch (err) {
                alert('Token Generation Failed.');
                btn.disabled = false;
            }
        }

        async function skipQuiz() {
            const btn = document.getElementById('skip-btn');
            const email = new URLSearchParams(window.location.search).get('email') || 'candidate@nuc7.dev';
            btn.disabled = true;
            btn.textContent = 'Generating Access Token...';

            try {
                const courseId = new URLSearchParams(window.location.search).get('course') || 'osi-model';
                const res = await fetch(`${BRIDGE_URL}/get-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, score: 0, courseId, skip: true })
                });
                const { token } = await res.json();
                location.href = `course.html?id=${courseId}&token=${token}&email=${encodeURIComponent(email)}`;
            } catch (err) {
                alert('Token Generation Failed.');
                btn.disabled = false;
                btn.textContent = 'Skip Assessment & Start Course Directly';
            }
        }
    </script>
</body>

</html>
