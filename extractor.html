<!DOCTYPE html>
<html>

<head>
    <title>PDF Extractor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        #status {
            font-weight: bold;
            color: blue;
        }

        textarea {
            width: 100%;
            height: 300px;
            margin-top: 10px;
        }

        img {
            border: 1px solid #ccc;
            margin: 5px;
            max-width: 300px;
        }
    </style>
</head>

<body>
    <h1>PDF Extractor</h1>
    <div id="status">Starting...</div>
    <div id="images"></div>
    <textarea id="output"></textarea>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function extract() {
            try {
                const pdfUrl = 'publication_4_20245_670.pdf';
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                const pdf = await loadingTask.promise;
                document.getElementById('status').innerText = 'PDF loaded. Pages: ' + pdf.numPages;

                let fullText = '';

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const strings = textContent.items.map(item => item.str);
                    fullText += `--- PAGE ${i} ---\n` + strings.join(' ') + '\n\n';

                    // Extract image using viewport
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                    const img = document.createElement('img');
                    img.src = canvas.toDataURL('image/jpeg', 0.8);

                    const btn = document.createElement('a');
                    btn.href = img.src;
                    btn.download = `page_${i}.jpg`;
                    btn.innerText = `Download Page ${i} Image`;
                    btn.style.display = 'block';

                    document.getElementById('images').appendChild(img);
                    document.getElementById('images').appendChild(btn);

                    // Auto trigger download
                    btn.click();
                }

                document.getElementById('output').value = fullText;
                document.getElementById('status').innerText = 'Extraction Complete!';
                document.getElementById('status').style.color = 'green';

                // Trigger text download
                const blob = new Blob([fullText], { type: "text/plain;charset=utf-8" });
                const textUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = textUrl;
                a.download = "extracted_text.txt";
                a.click();
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = 'Error: ' + err.message;
                document.getElementById('status').style.color = 'red';
            }
        }

        extract();
    </script>
</body>

</html>
