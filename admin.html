<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUC7 | Analytics Vault</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
</head>

<body style="padding-top: 100px;">
    <nav class="navbar">
        <div class="container nav-container">
            <span class="nav-logo">NUC7</span>
            <div class="nav-links">
                <a href="index.html">Exit Dashboard</a>
            </div>
        </div>
    </nav>

    <div id="login-screen" class="container">
        <div class="glass-card fade-in" style="max-width: 400px; margin: 0 auto; text-align: center;">
            <span class="badge">SECURE ACCESS</span>
            <h2 style="margin-bottom: 2rem;">Unlock Analytics</h2>
            <form id="login-form">
                <input type="password" id="admin-pass" placeholder="Vault Password" required>
                <button type="submit" class="cta-btn" style="width: 100%;">Authorize Access</button>
            </form>
            <div id="login-err"
                style="margin-top: 1.5rem; color: #ff4444; font-size: 0.8rem; text-transform: uppercase;"></div>
        </div>
    </div>

    <div id="dashboard" class="container" style="display: none;">
        <div class="fade-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4rem;">
                <h2 style="font-weight: 200;">Production <span style="font-weight: 600;">Intelligence</span></h2>
                <button onclick="location.reload()" class="outline-btn" style="padding: 0.6rem 1.5rem;">Logout</button>
            </div>

            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; margin-bottom: 5rem;">
                <div class="glass-card" style="padding: 2rem; text-align: center;">
                    <span id="stat-active" style="font-size: 3rem; font-weight: 200; display: block;">--</span>
                    <span class="badge" style="margin-bottom: 0;">Live Users</span>
                </div>
                <div class="glass-card" style="padding: 2rem; text-align: center;">
                    <span id="stat-views" style="font-size: 3rem; font-weight: 200; display: block;">--</span>
                    <span class="badge" style="margin-bottom: 0;">Total Hits</span>
                </div>
                <div class="glass-card" style="padding: 2rem; text-align: center;">
                    <span id="stat-reg" style="font-size: 3rem; font-weight: 200; display: block;">--</span>
                    <span class="badge" style="margin-bottom: 0;">Registrations</span>
                </div>
            </div>

            <div class="glass-card" style="padding: 0; overflow: hidden;">
                <div
                    style="padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02);">
                    <h3 style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">Real-Time Visitor Log
                    </h3>
                </div>
                <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem;">
                    <thead>
                        <tr style="background: rgba(255,255,255,0.05);">
                            <th style="padding: 1.2rem; font-weight: 600; color: var(--text-secondary);">TIME (UTC)</th>
                            <th style="padding: 1.2rem; font-weight: 600; color: var(--text-secondary);">PATH</th>
                            <th style="padding: 1.2rem; font-weight: 600; color: var(--text-secondary);">REFERRER</th>
                            <th style="padding: 1.2rem; font-weight: 600; color: var(--text-secondary);">AGENT</th>
                        </tr>
                    </thead>
                    <tbody id="v-log">
                        <tr>
                            <td colspan="4" style="padding: 4rem; text-align: center; opacity: 0.3;">Establishing Vault
                                Connection...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const BRIDGE_URL = 'https://nuc7-auth-bridge.alivirgo123.workers.dev';
        const loginForm = document.getElementById('login-form');
        const loginErr = document.getElementById('login-err');
        const dash = document.getElementById('dashboard');
        const loginScreen = document.getElementById('login-screen');

        let savedPass = '';

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            savedPass = document.getElementById('admin-pass').value;
            await sync();
        });

        async function sync() {
            try {
                const res = await fetch(`${BRIDGE_URL}/stats`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: savedPass })
                });

                if (res.ok) {
                    const data = await res.json();
                    loginScreen.style.display = 'none';
                    dash.style.display = 'block';

                    document.getElementById('stat-active').textContent = data.activeUsers || 0;
                    document.getElementById('stat-views').textContent = data.pageViews || 0;
                    document.getElementById('stat-reg').textContent = data.totalRegistrations || 0;

                    const tbody = document.getElementById('v-log');
                    tbody.innerHTML = data.hits.map(h => `
                        <tr>
                            <td style="padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05);">${new Date(h.timestamp).toLocaleTimeString()}</td>
                            <td style="padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff;"><code>${h.path}</code></td>
                            <td style="padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-secondary);">${h.referrer}</td>
                            <td style="padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-secondary);">${h.userAgent ? h.userAgent.split(')')[0] + ')' : 'Auto'}</td>
                        </tr>
                    `).join('') || '<tr><td colspan="4" style="padding: 4rem; text-align: center;">No activity recorded.</td></tr>';

                    setTimeout(sync, 15000);
                } else {
                    loginErr.textContent = 'Unauthorized: Access Denied';
                }
            } catch (err) {
                loginErr.textContent = 'Connection Refused by Bridge';
            }
        }
    </script>
</body>

</html>
